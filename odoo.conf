[options]

; ------------------------
; Security
; ------------------------
admin_passwd = admin

; ------------------------
; Database (use env vars from Railway)
; ------------------------
db_host = $PGHOST
db_port = $PGPORT
db_user = $PGUSER
db_password = $PGPASSWORD

; Optional: lock to one DB
db_name = $PGDATABASE

; ------------------------
; Addons
; ------------------------
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons

; ------------------------
; Server
; ------------------------
proxy_mode = True
http_interface = 0.0.0.0
http_port = 8069